<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Senil</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  font-family: Arial;
  text-align:center;
  color:white;
}
h1 {
  margin-top:50px;
  font-size:30px;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {text-shadow: 0 0 10px white;}
  to {text-shadow: 0 0 20px yellow;}
}

/* Cake */
.cake {
  font-size:80px;
  margin-top:20px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%,100%{transform: translateY(0);}
  50%{transform: translateY(-20px);}
}

/* Hearts */
.heart {
  position:absolute;
  color:red;
  animation: float 5s linear infinite;
}
@keyframes float {
  0%{transform: translateY(100vh);}
  100%{transform: translateY(-10vh);}
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Senil 😘 🎉</h1>

<div class="cake">🎂</div>

<p>
Happy birthday to you, my love ❤️ <br>
You are my everything 💕 <br>
Forever with you 💖
</p>

<script>
// hearts
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(Math.random()*20+10)+"px";
  document.body.appendChild(h);

  setTimeout(()=>{h.remove();},5000);
},300);

// confetti
setInterval(()=>{
  let c=document.createElement("div");
  c.innerHTML="🎉";
  c.style.position="absolute";
  c.style.left=Math.random()*100+"vw";
  c.style.top="-20px";
  c.style.fontSize="20px";
  document.body.appendChild(c);

  let fall=setInterval(()=>{
    c.style.top=(c.offsetTop+5)+"px";
    if(c.offsetTop>window.innerHeight){
      c.remove();
      clearInterval(fall);
    }
  },50);
},500);
</script>

</body>
</html>
